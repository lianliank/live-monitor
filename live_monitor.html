<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播监控中心</title>
<style>
  :root {
    --bg: #0d1117;
    --card-bg: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --dim: #8b949e;
    --live: #da3633;
    --offline: #484f58;
    --huya: #ffc107;
    --bili: #00a1d6;
    --accent: #58a6ff;
    --green: #3fb950;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  .container { max-width: 900px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .header .updated { font-size: 12px; color: var(--dim); }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Platform cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 24px; transition: border-color 0.3s;
  }
  .card.live { border-color: var(--live); box-shadow: 0 0 20px rgba(218,54,51,0.1); }
  .card-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
  }
  .platform-badge {
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    padding: 3px 10px; border-radius: 20px; text-transform: uppercase;
  }
  .platform-badge.huya { background: rgba(255,193,7,0.15); color: var(--huya); }
  .platform-badge.bilibili { background: rgba(0,161,214,0.15); color: var(--bili); }
  .status-badge {
    font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px;
  }
  .status-badge.live { background: rgba(218,54,51,0.18); color: #ff7b72; }
  .status-badge.offline { background: rgba(139,148,158,0.12); color: var(--dim); }
  .status-badge.error { background: rgba(218,54,51,0.12); color: #ff7b72; }
  .card-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .card-meta { font-size: 12px; color: var(--dim); margin-bottom: 2px; }
  .card-link { font-size: 12px; color: var(--accent); text-decoration: none; display: inline-block; margin-top: 8px; }
  .card-link:hover { text-decoration: underline; }
  .live-indicator {
    display: flex; align-items: center; gap: 6px; font-size: 13px; color: #ff7b72;
    margin-top: 10px; font-weight: 500;
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--live);
    animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Timeline */
  .section-title {
    font-size: 14px; font-weight: 600; color: var(--dim); margin-bottom: 14px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .timeline { margin-bottom: 28px; }
  .log-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 10px 0; border-bottom: 1px solid rgba(48,54,61,0.5);
    font-size: 13px;
  }
  .log-time { color: var(--dim); white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 130px; font-size: 12px; }
  .log-dot {
    width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; flex-shrink: 0;
  }
  .log-dot.live_start { background: var(--live); }
  .log-dot.live_end { background: var(--offline); }
  .log-dot.action_done { background: var(--accent); }
  .log-dot.check, .log-dot.offline { background: var(--offline); }
  .log-dot.error { background: var(--live); }
  .log-content { flex:1; }
  .log-name { font-weight: 600; }
  .log-plat { font-size: 11px; color: var(--dim); margin-left: 6px; }
  .log-detail { color: var(--dim); font-size: 12px; margin-top: 2px; }

  /* Footer */
  .footer { text-align: center; font-size: 11px; color: var(--dim); padding-top: 20px; border-top: 1px solid var(--border); }

  /* Error state */
  .no-data { text-align: center; padding: 60px 20px; color: var(--dim); }
  .no-data .icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>📡 直播监控中心</h1>
      <div class="updated" id="updateTime">加载中…</div>
    </div>
    <div><span class="dot"></span>运行中</div>
  </div>

  <!-- 平台卡片 -->
  <div class="cards" id="cards"></div>

  <!-- 运行时间线 -->
  <div class="section-title">运行记录</div>
  <div class="timeline" id="timeline"></div>

  <div class="footer">Hanako · 直播监控系统 · 定时巡查 18:00-03:00</div>
</div>

<script>
const DATA_URL = 'live_monitor.json';
let data = null;

async function loadData() {
  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    data = await resp.json();
    render();
  } catch(e) {
    console.error('加载数据失败:', e);
    document.getElementById('updateTime').textContent = '数据加载失败 · ' + new Date().toLocaleTimeString('zh-CN');
  }
}

function render() {
  if (!data) return;

  // 更新时间
  const updated = data.updatedAt || '';
  document.getElementById('updateTime').textContent = '更新于 ' + updated;

  // 渲染卡片
  const cardsEl = document.getElementById('cards');
  const platforms = data.platforms || {};
  const platformOrder = Object.keys(platforms).sort();

  if (platformOrder.length === 0) {
    cardsEl.innerHTML = '<div class="no-data"><div class="icon">📭</div><p>暂无监控数据，等待首次巡查…</p></div>';
    document.getElementById('timeline').innerHTML = '';
    return;
  }

  cardsEl.innerHTML = platformOrder.map(key => {
    const p = platforms[key];
    const isLive = p.status === 'live';
    const icon = p.platform === 'bilibili' ? '🔵' : '🟠';
    const liveHTML = isLive
      ? '<div class="live-indicator"><span class="live-dot"></span>正在直播' + (p.online ? ' · ' + formatNum(p.online) + ' 人在看' : '') + '</div>'
      : '';
    const areaHTML = p.area ? `<div class="card-meta">分区：${p.area}</div>` : '';
    const detailHTML = p.detail ? `<div class="card-meta">${p.detail}</div>` : '';
    return `
      <div class="card ${isLive ? 'live' : ''}">
        <div class="card-header">
          <span class="platform-badge ${p.platform}">${p.platform === 'bilibili' ? 'B站' : '虎牙'}</span>
          <span class="status-badge ${p.status}">${isLive ? '● 直播中' : (p.status === 'error' ? '⚠ 异常' : '○ 未开播')}</span>
        </div>
        <div class="card-title">${icon} ${p.name || '房间 ' + p.roomId}</div>
        <div class="card-meta">房间号：${p.roomId}</div>
        ${areaHTML}
        ${detailHTML}
        ${liveHTML}
        <a class="card-link" href="${p.url}" target="_blank" rel="noopener">打开直播间 →</a>
        <div class="card-meta" style="margin-top:8px;font-size:11px;">上次检查：${p.lastCheck || '—'}</div>
      </div>
    `;
  }).join('');

  // 渲染时间线
  const logs = (data.logs || []).slice().reverse().slice(0, 30);
  const timelineEl = document.getElementById('timeline');

  if (logs.length === 0) {
    timelineEl.innerHTML = '<div class="log-item" style="justify-content:center;color:var(--dim)">暂无运行记录</div>';
  } else {
    timelineEl.innerHTML = logs.map(l => {
      const platLabel = l.platform === 'bilibili' ? 'B站' : '虎牙';
      const eventLabels = {
        live_start: '🔴 开播',
        live_end: '⚫ 下播',
        live_ongoing: '🟢 直播中',
        offline: '⚪ 未开播',
        error: '⛔ 异常',
        action_done: '✅ 自动操作完成',
        check: '🔍 检查',
      };
      const eventLabel = eventLabels[l.event] || l.event;
      return `
        <div class="log-item">
          <div class="log-time">${l.time}</div>
          <div class="log-dot ${l.event}"></div>
          <div class="log-content">
            <span class="log-name">${l.name}</span>
            <span class="log-plat">${platLabel} · ${l.roomId}</span>
            <span style="margin-left:8px;">${eventLabel}</span>
            ${l.detail ? `<div class="log-detail">${l.detail}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }
}

function formatNum(n) {
  if (n >= 10000) return (n/10000).toFixed(1) + '万';
  return n.toString();
}

// 页面加载
loadData();
// 每30秒刷新
setInterval(loadData, 30000);
</script>
</body>
</html>
